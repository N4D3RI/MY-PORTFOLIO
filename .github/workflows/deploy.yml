name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect base path
        id: base
        # If the repo is named "<user>.github.io", it's a user site — no basePath needed.
        # Otherwise, the site is served at /<repo>/ and needs basePath set.
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}
          NEXT_PUBLIC_BUILD_HASH: ${{ github.sha }}
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
